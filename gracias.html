<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias | Vurpix</title>

  <style>
    :root {
      --bg: #f5f7fa;
      --vurpix-blue: #1f6ba8;
      --vurpix-cyan: #1aa7d8;
      --accent: #e64868;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      display: grid;
      place-items: center;
      height: 100vh;
      text-align: center;
      color: var(--vurpix-blue);
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    img.logo {
      width: 220px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      color: #6f8098;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 22px;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.9;
    }

  </style>
</head>
<body>

  <div class="container">
    <img class="logo" src="assets/vurpix_Logo_2024 _sin _fondo.png" alt="Vurpix">

    <h1>¡Gracias por registrarte!</h1>

    <p>
      Hemos recibido tu solicitud.<br>
      Te confirmaremos tu participación muy pronto.
    </p>

    <a class="btn" href="index.html">Volver al inicio</a>
  </div>

</body>
</html>
